<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Samba Upload Test</title>
</head>
<body>
    <h2>Test File Upload to Samba</h2>
    
    <form action="http://localhost:5000/upload" method="POST" enctype="multipart/form-data">
        
        <label>Choose a file to upload to the root of the Samba share:</label><br><br>
        <input type="file" name="file" required><br><br>
        
        <button type="submit">Upload File</button>
    </form>
</body>
</html>
